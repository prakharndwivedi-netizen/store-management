name: Deploy StockFlow to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fix file casing for case-sensitive filesystems
        run: |
          if [ -f src/Main.tsx ]; then
            echo "Found src/Main.tsx, renaming to src/main.tsx"
            mv src/Main.tsx src/main.tsx
          fi

      - name: Install Project Dependencies
        run: npm install

      - name: Build Production Assets
        run: npm run build

      - name: Setup Pages Configuration
        uses: actions/configure-pages@v4

      - name: Upload Built Dist Files
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
