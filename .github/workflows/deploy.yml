name: Deploy StockFlow to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Auto-detect Project Directory and Build
        run: |
          # Find the folder containing package.json (excluding node_modules)
          PROJECT_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          echo "Detected project directory: $PROJECT_DIR"
          
          # Navigate to project directory
          cd "$PROJECT_DIR"
          
          # Fix casing of src/Main.tsx or src/main.tsx if needed
          if [ -d src ]; then
            if [ -f src/Main.tsx ]; then
              echo "Fixing file casing: src/Main.tsx -> src/main.tsx"
              mv src/Main.tsx src/main.tsx
            fi
          fi
          
          # Install dependencies and build
          npm install
          npm run build
          
          # If the project is in a subdirectory, copy dist folder to the workspace root
          if [ "$PROJECT_DIR" != "." ]; then
            echo "Copying built dist folder to workspace root"
            cp -r dist "$GITHUB_WORKSPACE/"
          fi

      - name: Setup Pages Configuration
        uses: actions/configure-pages@v4

      - name: Upload Built Dist Files
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
